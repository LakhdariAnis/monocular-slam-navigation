%YAML:1.0

#--------------------------------------------------------------------------------------------
# Camera Parameters — Pi Camera (Monocular)
# Calibrated at 640x480 @ 30fps
#--------------------------------------------------------------------------------------------

Camera.type: "PinHole"

# Intrinsic parameters (fx, fy, cx, cy)
Camera.fx: 509.7646
Camera.fy: 515.5453
Camera.cx: 325.8610
Camera.cy: 239.5761

# Distortion coefficients (OpenCV: k1, k2, p1, p2, k3)
Camera.k1:  0.232565
Camera.k2: -0.490644
Camera.p1:  0.002399
Camera.p2:  0.004479
Camera.k3:  0.302230

# Image dimensions
Camera.width:  640
Camera.height: 480

# Camera frames per second
Camera.fps: 30

# Color order of the images (0: BGR, 1: RGB — Pi camera outputs RGB)
Camera.RGB: 1

#--------------------------------------------------------------------------------------------
# ORB Parameters
#--------------------------------------------------------------------------------------------

# Number of features per image
ORBextractor.nFeatures: 1000

# Scale factor between levels in the scale pyramid
ORBextractor.scaleFactor: 1.2

# Number of levels in the scale pyramid
ORBextractor.nLevels: 8

# Fast threshold
# Image is divided in a grid. At each cell FAST are extracted imposing a minimum response.
# Firstly we impose iniThFAST. If no corners are detected we impose a lower value minThFAST
# You can lower these values if your images have low contrast
ORBextractor.iniThFAST: 20
ORBextractor.minThFAST: 7

#--------------------------------------------------------------------------------------------
# Viewer Parameters
#--------------------------------------------------------------------------------------------

Viewer.KeyFrameSize: 0.05
Viewer.KeyFrameLineWidth: 1.0
Viewer.GraphLineWidth: 0.9
Viewer.PointSize: 2.0
Viewer.CameraSize: 0.08
Viewer.CameraLineWidth: 3.0
Viewer.ViewpointX: 0.0
Viewer.ViewpointY: -0.7
Viewer.ViewpointZ: -1.8
Viewer.ViewpointF: 500.0
#--------------------------------------------------------------------------------------------
# Map Serialization (Save/Load Atlas)
#--------------------------------------------------------------------------------------------
# This tells ORB-SLAM3 to auto-save the point cloud map to room_map.osa when Shutdown() is invoked.

# ── Auto-generated by slam_reader ──
System.LoadAtlasFromFile: "data/room_map"
